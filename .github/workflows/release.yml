name: Release

# Triggered only when a GitHub Release is published. The release tag (e.g. v1.2.0)
# is the source of truth for the version: we bump package.json to match, push the
# bump back to main, and publish to npm.
on:
  release:
    types: [published]

permissions:
  contents: write # push the version-bump commit back to main

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # commit the bump onto the branch, not the detached release tag
          fetch-depth: 0
          persist-credentials: true

      - uses: pnpm/action-setup@v4 # reads packageManager (pnpm@10.6.3) from package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Type-check the library
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build dist
        run: pnpm build

      - name: Resolve version from release tag
        id: ver
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ github.event.release.tag_name }}

      - name: Bump package.json
        run: npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Commit version bump back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): ${{ steps.ver.outputs.version }} [skip ci]"
          git push origin main

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
