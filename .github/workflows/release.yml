name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write # create tags / releases, push the changelog commit back
  issues: write # semantic-release comments on related issues/PRs
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    # The write-back commit carries [skip ci]; skip self re-triggering (belt and braces).
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full tag/commit history
          persist-credentials: true

      - uses: pnpm/action-setup@v4 # reads packageManager (pnpm@10.6.3) from package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Type-check the library
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build dist
        run: pnpm build

      - name: Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
